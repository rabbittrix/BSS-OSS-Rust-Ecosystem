{{- if .Values.pcfNextgen.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bss-oss-rust.fullname" . }}-pcf-nextgen
  labels:
    {{- include "bss-oss-rust.labels" . | nindent 4 }}
    app.kubernetes.io/component: pcf-nextgen
spec:
  replicas: {{ .Values.pcfNextgen.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bss-oss-rust.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pcf-nextgen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bss-oss-rust.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pcf-nextgen
    spec:
      containers:
        - name: pcf-nextgen
          image: "{{ .Values.pcfNextgen.image.repository }}:{{ .Values.pcfNextgen.image.tag }}"
          imagePullPolicy: {{ .Values.pcfNextgen.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.pcfNextgen.service.targetPort }}
          env:
            - name: PCF_BIND
              value: "0.0.0.0:{{ .Values.pcfNextgen.service.targetPort }}"
            - name: KAFKA_BROKERS
              value: {{ .Values.pcfNextgen.kafka.brokers | quote }}
            - name: REDIS_URL
              value: {{ .Values.pcfNextgen.redis.url | quote }}
            - name: DATABASE_URL
              value: {{ .Values.pcfNextgen.postgres.url | quote }}
            - name: PCF_REQUIRE_BEARER
              value: {{ .Values.pcfNextgen.security.requireBearer | quote }}
            - name: RUST_LOG
              value: {{ .Values.pcfNextgen.logLevel | quote }}
            {{- range $k, $v := .Values.pcfNextgen.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.pcfNextgen.resources | nindent 12 }}
{{- end }}
